<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
    <script src="script.js" defer></script>
    <title>Claculator</title>
</head>
<body>
    <div class="bground">
        <div class="display">
            <div class="input">

            </div>
            <div class="result">

            </div>
            
            
        </div>
        <hr>
        <div class="btn">
            <button id="clear">C</button>
            <button class="operator " >( )</button>
            <button class="operator "  >%</button>
            <button class="operator" id="divsion">/</button>
            <button class="number" id="seven">7</button>
            <button class="number" id="eight">8</button>
            <button class="number" id="nine">9</button>
            <button class="operator" id="multiplication">x</button>
            <button class="number" id="four">4</button>
            <button class="number" id="five">5</button>
            <button class="number" id="six">6</button>
            <button class="operator" id="substraction">-</button>
            <button class="number" id="one">1</button>
            <button class="number" id="two">2</button>
            <button class="number" id="three">3</button>
            <button class="operator" id="addition">+</button>
            <button class="number">+/-</button>
            <button class="number" id="zero">0</button>
            <button class="number" id="dot">.</button>
            <button id="equal" class="operator">=</button>

        </div>

    </div>
    <p>The parentheses and percentage buttons aren't functional yet </p>
</body>
</html>
